<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Problem Solving - Enquiry Rich Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #14b8a6;
      --cream: #FFF8EE;
      --ink: #2C2C2C;
      --white: #ffffff;
      --font-display: 'Fredoka', sans-serif;
      --font-sketch: 'Gaegu', cursive;
    }
    body { font-family: var(--font-display); background: var(--cream); color: var(--ink); min-height: 100vh; overflow-y: auto; }
    .page-header {
      background: var(--accent); color: var(--white); padding: 0.75rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem;
      border-bottom: 3px solid var(--ink);
    }
    .page-header h1 { font-size: 1.6rem; display: flex; align-items: center; gap: 0.5rem; }
    .page-header h1 .op { font-family: var(--font-sketch); font-size: 1.8rem; opacity: 0.8; }
    .back-link {
      color: var(--white); text-decoration: none; font-weight: 600; font-size: 0.95rem;
      padding: 0.35rem 0.9rem; border: 2.5px solid rgba(255,255,255,0.6); border-radius: 0.75rem;
      transition: background 150ms, border-color 150ms;
    }
    .back-link:hover, .back-link:focus { background: rgba(255,255,255,0.2); border-color: var(--white); }
    .back-link:focus-visible { outline: 2px dashed var(--white); outline-offset: 3px; }
    .game-frame { width: 100%; border: none; display: block; }
    .tab-bar {
      display: flex; gap: 0; background: var(--cream);
      border-bottom: 3px solid var(--ink);
    }
    .tab-btn {
      flex: 1; padding: 0.65rem 1rem; border: none;
      background: #E8D8C4; font-family: var(--font-display);
      font-size: 1rem; font-weight: 600; color: var(--ink);
      cursor: pointer; border-right: 2px solid var(--ink);
      transition: background 150ms;
    }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active {
      background: var(--cream); color: #0d9488;
      border-bottom: 3px solid var(--accent); margin-bottom: -3px;
    }
    .tab-btn:hover:not(.active) { background: #F5E6CF; }
    .tab-btn:focus-visible { outline: 3px solid var(--accent); outline-offset: -3px; }
    .game-container { display: none; }
    .game-container.active { display: block; }
  </style>
</head>
<body>
  <header class="page-header">
    <h1><span class="op">?</span> Problem Solving</h1>
    <a href="index.html" class="back-link">&larr; Home</a>
  </header>

  <nav class="tab-bar" role="tablist">
    <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="game1" id="tab1" onclick="switchTab(0)">Make 100</button>
    <button class="tab-btn" role="tab" aria-selected="false" aria-controls="game2" id="tab2" onclick="switchTab(1)">Number Detective</button>
  </nav>

  <div class="game-container active" id="game1" role="tabpanel" aria-labelledby="tab1">
    <iframe src="games/make-100.html" class="game-frame" loading="lazy" title="Make 100 game"></iframe>
  </div>
  <div class="game-container" id="game2" role="tabpanel" aria-labelledby="tab2">
    <iframe src="games/number-detective.html" class="game-frame" loading="lazy" title="Number Detective game"></iframe>
  </div>

  <script>
    const tabs = document.querySelectorAll('.tab-btn');
    const panels = document.querySelectorAll('.game-container');
    function switchTab(index) {
      tabs.forEach((t, i) => {
        t.classList.toggle('active', i === index);
        t.setAttribute('aria-selected', i === index ? 'true' : 'false');
      });
      panels.forEach((p, i) => p.classList.toggle('active', i === index));
    }
    function resizeFrames() {
      const h = window.innerHeight - (document.querySelector('.page-header').offsetHeight + document.querySelector('.tab-bar').offsetHeight);
      document.querySelectorAll('.game-frame').forEach(f => f.style.height = Math.max(500, h) + 'px');
    }
    window.addEventListener('resize', resizeFrames);
    window.addEventListener('load', resizeFrames);
  </script>
</body>
</html>
