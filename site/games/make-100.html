<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Make 100 - Maths Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ========== Design System Tokens ========== */
:root {
  --color-primary: #4A90D9;
  --color-primary-dark: #2E5C8A;
  --color-danger: #E85D75;
  --color-danger-dark: #B83A50;
  --color-success: #5CB85C;
  --color-success-dark: #3D7A3D;
  --color-warning: #F5A623;
  --color-warning-dark: #C47D0E;
  --color-purple: #9B6BC2;
  --color-purple-dark: #6B3FA0;
  --color-orange: #F5A623;
  --color-pink: #E85D75;
  --color-teal: #14b8a6;
  --color-bg: #FFF8EE;
  --color-bg-dark: #F0E6D3;
  --color-text: #2C2C2C;
  --color-text-light: #6B6B6B;
  --color-white: #ffffff;
  --color-black: #000000;
  --font-display: 'Fredoka', Arial, sans-serif;
  --font-sketch: 'Gaegu', cursive;
  --font-size-min: 14px;
  --font-size-sm: 0.875rem;
  --font-size-base: 1rem;
  --font-size-lg: 1.25rem;
  --font-size-xl: 1.5rem;
  --font-size-2xl: 2rem;
  --font-size-3xl: 2.5rem;
  --shadow-card: 4px 4px 0px 0px rgba(0,0,0,1);
  --shadow-card-sm: 2px 2px 0px 0px rgba(0,0,0,1);
  --shadow-btn: 0 4px 0 0 rgba(0,0,0,0.25);
  --shadow-btn-active: 0 2px 0 0 rgba(0,0,0,0.25);
  --radius-sm: 0.5rem;
  --radius-md: 0.75rem;
  --radius-lg: 1rem;
  --radius-xl: 1.5rem;
  --radius-full: 9999px;
  --spacing-xs: 0.25rem;
  --spacing-sm: 0.5rem;
  --spacing-md: 1rem;
  --spacing-lg: 1.5rem;
  --spacing-xl: 2rem;
  --spacing-2xl: 3rem;
  --transition-fast: 150ms ease;
  --transition-normal: 250ms ease;
  --transition-slow: 400ms ease;
}

/* ========== Reset & Base ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-display);
  background: var(--color-bg);
  background-image: radial-gradient(circle at 20% 50%, rgba(74,144,217,0.03) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(232,93,117,0.03) 0%, transparent 50%),
                    radial-gradient(circle at 50% 80%, rgba(92,184,92,0.03) 0%, transparent 50%);
  color: var(--color-text);
  min-height: 100vh;
  overflow-y: auto;
  line-height: 1.5;
  font-size: var(--font-size-base);
  -webkit-font-smoothing: antialiased;
}
body, button, input, select, textarea { font-size: max(var(--font-size-min), 1em); }

.sr-only {
  position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
  overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
}

/* ========== Reduced Motion ========== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}

/* ========== Focus ========== */
:focus-visible { outline: 3px solid var(--color-primary); outline-offset: 2px; border-radius: 4px; }

/* ========== Layout ========== */
.game-container {
  max-width: 640px; margin: 0 auto; padding: var(--spacing-md);
  min-height: 100vh; display: flex; flex-direction: column;
}
.screen { display: none; flex-direction: column; align-items: center; gap: var(--spacing-lg); width: 100%; }
.screen.active { display: flex; }

/* ========== Top Bar ========== */
.top-bar {
  display: flex; justify-content: space-between; align-items: center; width: 100%;
  padding: var(--spacing-sm) 0;
}
.mute-btn {
  background: var(--color-bg-dark); border: 2px solid var(--color-black); border-radius: var(--radius-full);
  width: 44px; height: 44px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center;
  justify-content: center; box-shadow: var(--shadow-card-sm); transition: transform var(--transition-fast);
}
.mute-btn:active { transform: translateY(2px); box-shadow: none; }
.back-btn {
  background: var(--color-bg-dark); border: 2px solid var(--color-black); border-radius: var(--radius-md);
  padding: var(--spacing-xs) var(--spacing-sm); cursor: pointer; font-family: var(--font-display);
  font-weight: 600; font-size: var(--font-size-sm); box-shadow: var(--shadow-card-sm);
  transition: transform var(--transition-fast);
}
.back-btn:active { transform: translateY(2px); box-shadow: none; }

/* ========== Menu ========== */
.menu-title {
  font-family: var(--font-sketch); font-size: 3.5rem; font-weight: 700;
  color: var(--color-primary-dark); text-align: center; line-height: 1.1;
  text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
}
.menu-subtitle {
  font-family: var(--font-sketch); font-size: var(--font-size-xl);
  color: var(--color-text-light); text-align: center; margin-top: -0.5rem;
}
.menu-section { width: 100%; text-align: center; }
.menu-section h2 {
  font-size: var(--font-size-lg); margin-bottom: var(--spacing-sm); color: var(--color-text-light);
}
.btn-group { display: flex; gap: var(--spacing-sm); justify-content: center; flex-wrap: wrap; }

.btn {
  font-family: var(--font-display); font-weight: 600; border: 2px solid var(--color-black);
  border-radius: var(--radius-md); padding: var(--spacing-sm) var(--spacing-lg);
  cursor: pointer; font-size: var(--font-size-base); box-shadow: var(--shadow-btn);
  transition: transform var(--transition-fast), box-shadow var(--transition-fast);
  min-height: 44px; min-width: 44px; position: relative;
}
.btn:active { transform: translateY(2px); box-shadow: var(--shadow-btn-active); }
.btn-primary { background: var(--color-primary); color: var(--color-white); }
.btn-danger { background: var(--color-danger); color: var(--color-white); }
.btn-success { background: var(--color-success); color: var(--color-white); }
.btn-warning { background: var(--color-warning); color: var(--color-white); }
.btn-purple { background: var(--color-purple); color: var(--color-white); }
.btn-teal { background: var(--color-teal); color: var(--color-white); }
.btn.selected { outline: 3px solid var(--color-black); outline-offset: 2px; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.btn-lg { font-size: var(--font-size-lg); padding: var(--spacing-md) var(--spacing-xl); }

/* ========== Game HUD ========== */
.hud {
  display: flex; justify-content: space-between; align-items: center; width: 100%;
  background: var(--color-white); border: 2px solid var(--color-black);
  border-radius: var(--radius-md); padding: var(--spacing-sm) var(--spacing-md);
  box-shadow: var(--shadow-card-sm);
}
.hud-item { text-align: center; }
.hud-label { font-size: var(--font-size-sm); color: var(--color-text-light); }
.hud-value { font-size: var(--font-size-xl); font-weight: 700; }

/* ========== Timer Bar ========== */
.timer-bar-container {
  width: 100%; height: 12px; background: var(--color-bg-dark);
  border: 2px solid var(--color-black); border-radius: var(--radius-full); overflow: hidden;
}
.timer-bar {
  height: 100%; background: var(--color-success); transition: width 1s linear, background 0.3s ease;
  border-radius: var(--radius-full);
}
.timer-bar.warning { background: var(--color-warning); }
.timer-bar.danger { background: var(--color-danger); }

/* ========== Target Display ========== */
.target-display {
  text-align: center; padding: var(--spacing-md);
}
.target-label { font-size: var(--font-size-lg); color: var(--color-text-light); }
.target-number {
  font-family: var(--font-sketch); font-size: 5rem; font-weight: 700;
  color: var(--color-danger); line-height: 1; text-shadow: 3px 3px 0 rgba(0,0,0,0.1);
}

/* ========== Digit Cards ========== */
.digit-cards {
  display: flex; gap: var(--spacing-md); justify-content: center; flex-wrap: wrap;
}
.digit-card {
  width: 72px; height: 90px; border: 3px solid var(--color-black);
  border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center;
  font-family: var(--font-sketch); font-size: 2.8rem; font-weight: 700;
  color: var(--color-white); cursor: pointer; box-shadow: var(--shadow-card);
  transition: transform var(--transition-fast), opacity var(--transition-normal);
  user-select: none; -webkit-user-select: none;
}
.digit-card:active:not(.used) { transform: translateY(3px) scale(0.95); box-shadow: var(--shadow-card-sm); }
.digit-card.used { opacity: 0.3; cursor: not-allowed; transform: scale(0.9); }
.digit-card.pop { animation: cardPop 0.3s ease; }
@keyframes cardPop { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }

/* ========== Expression Chalkboard ========== */
.chalkboard {
  width: 100%; min-height: 80px; background: #2a3a2a; border: 3px solid var(--color-black);
  border-radius: var(--radius-md); padding: var(--spacing-md) var(--spacing-lg);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-card); position: relative;
}
.expression-text {
  font-family: var(--font-sketch); font-size: 2rem; font-weight: 700;
  color: #e8e8d0; text-align: center; word-break: break-all; line-height: 1.3;
  min-height: 2rem;
}
.expression-text .cursor {
  display: inline-block; width: 2px; height: 1.5em; background: #e8e8d0;
  vertical-align: middle; margin-left: 2px; animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

/* ========== Operator Buttons ========== */
.operator-row {
  display: flex; gap: var(--spacing-sm); justify-content: center; flex-wrap: wrap;
}
.op-btn {
  width: 56px; height: 56px; border-radius: var(--radius-full);
  border: 3px solid var(--color-black); font-size: 1.5rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--shadow-card-sm); transition: transform var(--transition-fast);
  font-family: var(--font-display); color: var(--color-white);
}
.op-btn:active:not(:disabled) { transform: translateY(2px); box-shadow: none; }
.op-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.op-btn.op-add { background: var(--color-primary); }
.op-btn.op-sub { background: var(--color-danger); }
.op-btn.op-mul { background: var(--color-purple); }
.op-btn.op-div { background: var(--color-teal); }
.op-btn.op-open { background: var(--color-warning); }
.op-btn.op-close { background: var(--color-orange); }

/* ========== Action Buttons Row ========== */
.action-row {
  display: flex; gap: var(--spacing-sm); justify-content: center; flex-wrap: wrap;
}

/* ========== Result Display ========== */
.result-display {
  text-align: center; padding: var(--spacing-md);
  background: var(--color-white); border: 2px solid var(--color-black);
  border-radius: var(--radius-md); box-shadow: var(--shadow-card-sm); width: 100%;
}
.result-value { font-size: var(--font-size-2xl); font-weight: 700; }
.result-score { font-size: var(--font-size-lg); color: var(--color-text-light); }

/* ========== Player Turn Indicator ========== */
.turn-indicator {
  text-align: center; font-size: var(--font-size-lg); font-weight: 600;
  padding: var(--spacing-sm) var(--spacing-md);
  background: var(--color-primary); color: var(--color-white);
  border: 2px solid var(--color-black); border-radius: var(--radius-md);
  box-shadow: var(--shadow-card-sm); width: 100%;
}

/* ========== Summary Screen ========== */
.summary-card {
  background: var(--color-white); border: 3px solid var(--color-black);
  border-radius: var(--radius-lg); padding: var(--spacing-xl);
  box-shadow: var(--shadow-card); width: 100%; text-align: center;
}
.summary-title {
  font-family: var(--font-sketch); font-size: var(--font-size-3xl); font-weight: 700;
  margin-bottom: var(--spacing-md);
}
.summary-scores { margin: var(--spacing-md) 0; }
.summary-row {
  display: flex; justify-content: space-between; padding: var(--spacing-sm) 0;
  border-bottom: 1px dashed var(--color-bg-dark); font-size: var(--font-size-lg);
}
.round-scores-table { width: 100%; margin: var(--spacing-md) 0; font-size: var(--font-size-sm); }
.round-scores-table th, .round-scores-table td {
  padding: var(--spacing-xs) var(--spacing-sm); text-align: center;
  border-bottom: 1px solid var(--color-bg-dark);
}
.round-scores-table th { color: var(--color-text-light); font-weight: 600; }

/* ========== Confetti ========== */
.confetti-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 1000; overflow: hidden;
}
.confetti-piece {
  position: absolute; width: 10px; height: 10px; top: -10px;
  animation: confettiFall 2.5s ease-in forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
}

/* ========== PERFECT animation ========== */
.perfect-banner {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
  font-family: var(--font-sketch); font-size: 4rem; font-weight: 700;
  color: var(--color-success); text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  z-index: 1001; animation: perfectPop 1.5s ease forwards; pointer-events: none;
  white-space: nowrap;
}
@keyframes perfectPop {
  0% { transform: translate(-50%, -50%) scale(0) rotate(-10deg); opacity: 0; }
  30% { transform: translate(-50%, -50%) scale(1.3) rotate(5deg); opacity: 1; }
  50% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0; }
}

/* ========== Demo Overlay ========== */
.demo-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.6); z-index: 900; display: none;
  align-items: center; justify-content: center;
}
.demo-overlay.active { display: flex; }
.demo-box {
  background: var(--color-white); border: 3px solid var(--color-black);
  border-radius: var(--radius-lg); padding: var(--spacing-xl); max-width: 500px;
  width: 90%; box-shadow: var(--shadow-card); text-align: center;
}
.demo-expression {
  font-family: var(--font-sketch); font-size: var(--font-size-2xl); font-weight: 700;
  background: #2a3a2a; color: #e8e8d0; padding: var(--spacing-md);
  border-radius: var(--radius-md); margin: var(--spacing-md) 0;
  min-height: 50px;
}
.demo-step {
  font-size: var(--font-size-lg); color: var(--color-text-light);
  margin: var(--spacing-sm) 0; min-height: 2em;
}
</style>
</head>
<body>
<div class="game-container">
  <!-- ========== MENU SCREEN ========== -->
  <div id="menu-screen" class="screen active">
    <div class="top-bar">
      <div></div>
      <button class="mute-btn" id="mute-btn" aria-label="Toggle sound">&#128264;</button>
    </div>
    <div class="menu-title">Make 100</div>
    <div class="menu-subtitle">Build expressions to hit the target!</div>

    <div class="menu-section">
      <h2>Players</h2>
      <div class="btn-group">
        <button class="btn btn-primary selected" data-players="1" aria-pressed="true">1 Player</button>
        <button class="btn btn-purple" data-players="2" aria-pressed="false">2 Players</button>
      </div>
    </div>

    <div class="menu-section">
      <h2>Difficulty</h2>
      <div class="btn-group">
        <button class="btn btn-success" data-diff="easy">Easy</button>
        <button class="btn btn-warning selected" data-diff="medium" aria-pressed="true">Medium</button>
        <button class="btn btn-danger" data-diff="hard">Hard</button>
      </div>
    </div>

    <div class="btn-group" style="margin-top: var(--spacing-md);">
      <button class="btn btn-success btn-lg" id="start-btn">Start Game</button>
      <button class="btn btn-teal btn-lg" id="demo-btn">Demo</button>
    </div>
  </div>

  <!-- ========== GAME SCREEN ========== -->
  <div id="game-screen" class="screen">
    <div class="top-bar">
      <button class="back-btn" id="back-btn">Menu</button>
      <button class="mute-btn" id="mute-btn-game" aria-label="Toggle sound">&#128264;</button>
    </div>

    <div class="hud">
      <div class="hud-item"><div class="hud-label">Round</div><div class="hud-value" id="hud-round">1/8</div></div>
      <div class="hud-item"><div class="hud-label">Score</div><div class="hud-value" id="hud-score">0</div></div>
      <div class="hud-item"><div class="hud-label">Time</div><div class="hud-value" id="hud-time">60</div></div>
    </div>

    <div class="timer-bar-container"><div class="timer-bar" id="timer-bar"></div></div>

    <div id="turn-indicator" class="turn-indicator" style="display:none;">Player 1's turn</div>

    <div class="target-display">
      <div class="target-label">Target</div>
      <div class="target-number">100</div>
    </div>

    <div class="digit-cards" id="digit-cards" aria-label="Digit cards"></div>

    <div class="chalkboard" aria-live="polite">
      <div class="expression-text" id="expression-display"><span class="cursor"></span></div>
    </div>

    <div class="operator-row" id="operator-row"></div>

    <div class="action-row">
      <button class="btn btn-warning" id="undo-btn" aria-label="Undo last entry">Undo</button>
      <button class="btn btn-danger" id="clear-btn" aria-label="Clear expression">Clear</button>
      <button class="btn btn-success btn-lg" id="calc-btn">Calculate</button>
    </div>

    <div id="result-area" class="result-display" style="display:none;" aria-live="assertive">
      <div class="result-value" id="result-value"></div>
      <div class="result-score" id="result-score"></div>
      <button class="btn btn-primary" id="next-btn" style="margin-top:var(--spacing-sm);">Next Round</button>
    </div>
  </div>

  <!-- ========== SUMMARY SCREEN ========== -->
  <div id="summary-screen" class="screen">
    <div class="summary-card">
      <div class="summary-title" id="summary-title">Game Over!</div>
      <div class="summary-scores" id="summary-scores"></div>
      <table class="round-scores-table" id="round-table"></table>
      <button class="btn btn-primary btn-lg" id="play-again-btn" style="margin-top:var(--spacing-lg);">Play Again</button>
    </div>
  </div>
</div>

<!-- Demo overlay -->
<div class="demo-overlay" id="demo-overlay">
  <div class="demo-box">
    <h2 style="font-family:var(--font-sketch); font-size:var(--font-size-2xl);">How to Play</h2>
    <p style="margin:var(--spacing-sm) 0; color:var(--color-text-light);">Use the 4 digit cards and operations to make 100!</p>
    <p style="font-size:var(--font-size-sm); color:var(--color-text-light);">Example: Cards are 5, 3, 8, 2</p>
    <div class="demo-expression" id="demo-expr"></div>
    <div class="demo-step" id="demo-step"></div>
    <div style="margin-top:var(--spacing-md);">
      <button class="btn btn-primary" id="demo-close-btn">Got it!</button>
    </div>
  </div>
</div>

<!-- Live region for screen reader announcements -->
<div id="sr-announce" class="sr-only" aria-live="assertive" role="status"></div>

<script>
/* ========== State ========== */
const G = {
  state: 'menu', // menu | game | summary
  players: 1,
  difficulty: 'medium',
  round: 0,
  totalRounds: 8,
  currentPlayer: 1,
  digits: [],
  usedDigits: [],  // indices of used digit cards
  expression: [],  // array of tokens: {type:'digit'|'op'|'bracket', value, digitIndex?}
  timerTotal: 45,
  timerLeft: 45,
  timerInterval: null,
  muted: false,
  speechSupported: false,
  scores: { 1: 0, 2: 0 },
  roundScores: [],  // [{p1: score, p2: score, digits: [...]}]
  // 2P state
  p1Expression: null,
  p1Result: null,
  p1Score: null,
};

const CARD_COLORS = ['#E85D75', '#4A90D9', '#5CB85C', '#9B6BC2'];
const DIFFICULTY_OPS = {
  easy: ['+', '-'],
  medium: ['+', '-', '\u00d7'],
  hard: ['+', '-', '\u00d7', '\u00f7'],
};
const DIFFICULTY_TIME = { easy: 60, medium: 45, hard: 30 };

/* ========== DOM refs ========== */
const $ = id => document.getElementById(id);
const menuScreen = $('menu-screen');
const gameScreen = $('game-screen');
const summaryScreen = $('summary-screen');
const screens = [menuScreen, gameScreen, summaryScreen];

/* ========== Speech ========== */
G.speechSupported = 'speechSynthesis' in window;

function speak(text) {
  if (G.muted || !G.speechSupported) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-GB'; u.rate = 0.95;
  window.speechSynthesis.speak(u);
}

function announce(text) {
  const el = $('sr-announce');
  el.textContent = '';
  requestAnimationFrame(() => { el.textContent = text; });
}

/* ========== Screen Management ========== */
function showScreen(name) {
  clearTimer();
  screens.forEach(s => s.classList.remove('active'));
  const target = $(name + '-screen');
  target.classList.add('active');
  G.state = name;
}

/* ========== Menu Logic ========== */
document.querySelectorAll('[data-players]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-players]').forEach(b => {
      b.classList.remove('selected'); b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('selected'); btn.setAttribute('aria-pressed', 'true');
    G.players = parseInt(btn.dataset.players);
  });
});

document.querySelectorAll('[data-diff]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-diff]').forEach(b => {
      b.classList.remove('selected'); b.setAttribute('aria-pressed', 'false');
    });
    btn.classList.add('selected'); btn.setAttribute('aria-pressed', 'true');
    G.difficulty = btn.dataset.diff;
  });
});

/* ========== Mute Toggle ========== */
function updateMuteButtons() {
  const icon = G.muted ? '\u{1F507}' : '\u{1F50A}';
  const label = G.muted ? 'Unmute sound' : 'Mute sound';
  [$('mute-btn'), $('mute-btn-game')].forEach(b => {
    if (b) { b.innerHTML = icon; b.setAttribute('aria-label', label); }
  });
}
[$('mute-btn'), $('mute-btn-game')].forEach(b => {
  if (b) b.addEventListener('click', () => {
    G.muted = !G.muted;
    if (G.muted) window.speechSynthesis.cancel();
    updateMuteButtons();
  });
});

/* ========== Start Game ========== */
$('start-btn').addEventListener('click', startGame);
$('back-btn').addEventListener('click', () => { showScreen('menu'); });
$('play-again-btn').addEventListener('click', () => { showScreen('menu'); });

function startGame() {
  G.round = 0;
  G.scores = { 1: 0, 2: 0 };
  G.roundScores = [];
  G.timerTotal = DIFFICULTY_TIME[G.difficulty];
  showScreen('game');
  speak('Let us make 100!');
  nextRound();
}

/* ========== Round Setup ========== */
function nextRound() {
  G.round++;
  if (G.round > G.totalRounds) { endGame(); return; }
  G.currentPlayer = 1;
  G.digits = Array.from({ length: 4 }, () => Math.floor(Math.random() * 9) + 1);
  G.roundScores.push({ p1: null, p2: null, digits: [...G.digits] });

  if (G.players === 2) {
    G.p1Expression = null; G.p1Result = null; G.p1Score = null;
  }
  setupRoundUI();
}

function setupRoundUI() {
  $('hud-round').textContent = G.round + '/' + G.totalRounds;
  updateScoreDisplay();

  const turnInd = $('turn-indicator');
  if (G.players === 2) {
    turnInd.style.display = '';
    turnInd.textContent = 'Player ' + G.currentPlayer + "'s turn";
    turnInd.style.background = G.currentPlayer === 1 ? 'var(--color-primary)' : 'var(--color-purple)';
  } else {
    turnInd.style.display = 'none';
  }

  // Reset expression
  G.expression = [];
  G.usedDigits = [];
  renderDigitCards();
  renderOperators();
  renderExpression();
  $('result-area').style.display = 'none';
  enableInputs(true);

  // Announce
  const digitStr = G.digits.join(', ');
  announce('Round ' + G.round + '. Your digits are ' + digitStr);
  speak('Round ' + G.round + '. Your digits are ' + digitStr);

  startTimer();
}

function updateScoreDisplay() {
  if (G.players === 1) {
    $('hud-score').textContent = G.scores[1];
  } else {
    $('hud-score').textContent = G.scores[1] + ' - ' + G.scores[2];
  }
}

/* ========== Digit Cards ========== */
function renderDigitCards() {
  const container = $('digit-cards');
  container.innerHTML = '';
  G.digits.forEach((d, i) => {
    const card = document.createElement('button');
    card.className = 'digit-card' + (G.usedDigits.includes(i) ? ' used' : '');
    card.style.background = CARD_COLORS[i];
    card.textContent = d;
    card.setAttribute('aria-label', 'Digit ' + d + (G.usedDigits.includes(i) ? ' (used)' : ''));
    card.disabled = G.usedDigits.includes(i);
    card.addEventListener('click', () => addDigit(i));
    container.appendChild(card);
  });
}

function addDigit(index) {
  if (G.usedDigits.includes(index)) return;
  // Validate: last token should not be a digit (need operator between digits)
  const last = G.expression[G.expression.length - 1];
  if (last && (last.type === 'digit' || (last.type === 'bracket' && last.value === ')'))) return;

  G.expression.push({ type: 'digit', value: G.digits[index], digitIndex: index });
  G.usedDigits.push(index);
  renderDigitCards();
  renderExpression();
  // Pop animation
  const cards = $('digit-cards').children;
  if (cards[index]) { cards[index].classList.add('pop'); }
}

/* ========== Operators ========== */
function renderOperators() {
  const row = $('operator-row');
  row.innerHTML = '';
  const ops = DIFFICULTY_OPS[G.difficulty];
  // Open bracket
  const openBtn = makeOpBtn('(', 'op-open', 'Open bracket');
  row.appendChild(openBtn);

  ops.forEach(op => {
    const cls = op === '+' ? 'op-add' : op === '-' ? 'op-sub' : op === '\u00d7' ? 'op-mul' : 'op-div';
    const label = op === '+' ? 'Plus' : op === '-' ? 'Minus' : op === '\u00d7' ? 'Times' : 'Divide';
    row.appendChild(makeOpBtn(op, cls, label));
  });

  // Close bracket
  const closeBtn = makeOpBtn(')', 'op-close', 'Close bracket');
  row.appendChild(closeBtn);
}

function makeOpBtn(symbol, cls, label) {
  const btn = document.createElement('button');
  btn.className = 'op-btn ' + cls;
  btn.textContent = symbol;
  btn.setAttribute('aria-label', label);
  btn.addEventListener('click', () => addOp(symbol));
  return btn;
}

function addOp(op) {
  if (op === '(' || op === ')') {
    addBracket(op);
    return;
  }
  // Operator can follow a digit or close bracket
  const last = G.expression[G.expression.length - 1];
  if (!last) return;
  if (last.type !== 'digit' && !(last.type === 'bracket' && last.value === ')')) return;

  G.expression.push({ type: 'op', value: op });
  renderExpression();
}

function addBracket(br) {
  const last = G.expression[G.expression.length - 1];
  if (br === '(') {
    // Can appear at start, after operator, or after open bracket
    if (last && last.type !== 'op' && !(last.type === 'bracket' && last.value === '(')) return;
    G.expression.push({ type: 'bracket', value: '(' });
  } else {
    // Close bracket: last must be digit or close bracket, and open count > close count
    if (!last) return;
    if (last.type !== 'digit' && !(last.type === 'bracket' && last.value === ')')) return;
    const opens = G.expression.filter(t => t.type === 'bracket' && t.value === '(').length;
    const closes = G.expression.filter(t => t.type === 'bracket' && t.value === ')').length;
    if (closes >= opens) return;
    G.expression.push({ type: 'bracket', value: ')' });
  }
  renderExpression();
}

/* ========== Expression Rendering ========== */
function renderExpression() {
  const el = $('expression-display');
  if (G.expression.length === 0) {
    el.innerHTML = '<span class="cursor"></span>';
    return;
  }
  let html = G.expression.map(t => {
    if (t.type === 'digit') return '<span style="color:' + CARD_COLORS[t.digitIndex] + '">' + t.value + '</span>';
    if (t.type === 'op') return ' ' + t.value + ' ';
    return t.value;
  }).join('');
  html += '<span class="cursor"></span>';
  el.innerHTML = html;
}

/* ========== Undo / Clear ========== */
$('undo-btn').addEventListener('click', () => {
  if (G.expression.length === 0) return;
  const removed = G.expression.pop();
  if (removed.type === 'digit') {
    G.usedDigits = G.usedDigits.filter(i => i !== removed.digitIndex);
    renderDigitCards();
  }
  renderExpression();
});

$('clear-btn').addEventListener('click', () => {
  G.expression = [];
  G.usedDigits = [];
  renderDigitCards();
  renderExpression();
});

/* ========== Calculate ========== */
$('calc-btn').addEventListener('click', calculateExpression);

function calculateExpression() {
  // Must have at least one digit
  if (G.expression.length === 0) return;
  // Last token must be digit or close bracket
  const last = G.expression[G.expression.length - 1];
  if (last.type !== 'digit' && !(last.type === 'bracket' && last.value === ')')) {
    announce('Expression is incomplete');
    speak('Expression is incomplete');
    return;
  }
  // Balance brackets
  const opens = G.expression.filter(t => t.type === 'bracket' && t.value === '(').length;
  const closes = G.expression.filter(t => t.type === 'bracket' && t.value === ')').length;
  if (opens !== closes) {
    announce('Brackets are not balanced');
    speak('Brackets are not balanced');
    return;
  }

  const exprStr = G.expression.map(t => t.value).join(' ');
  let result;
  try {
    result = parseAndEvaluate(exprStr);
  } catch (e) {
    announce('Invalid expression');
    speak('Invalid expression');
    return;
  }

  if (!isFinite(result)) {
    announce('Cannot divide by zero');
    speak('Cannot divide by zero');
    return;
  }

  result = Math.round(result * 1000) / 1000; // round to avoid float issues
  const diff = Math.abs(result - 100);
  const roundScore = Math.max(0, Math.round(100 - diff));

  clearTimer();
  enableInputs(false);
  showResult(result, roundScore);
}

function showResult(result, roundScore) {
  $('result-area').style.display = '';
  $('result-value').textContent = 'Result: ' + result;
  $('result-score').textContent = 'Score: ' + roundScore + ' / 100';

  const isPerfect = result === 100;

  if (G.players === 1) {
    G.scores[1] += roundScore;
    G.roundScores[G.round - 1].p1 = roundScore;
    updateScoreDisplay();

    if (isPerfect) {
      showPerfect();
      speak('Perfect! You scored 100 points!');
    } else {
      speak('You got ' + result + '. That scores ' + roundScore + ' points.');
    }
    announce('Result is ' + result + '. Score: ' + roundScore);
    $('next-btn').textContent = G.round >= G.totalRounds ? 'See Results' : 'Next Round';
  } else {
    // 2 player mode
    if (G.currentPlayer === 1) {
      G.p1Result = result;
      G.p1Score = roundScore;
      G.p1Expression = G.expression.map(t => t.value).join(' ');
      if (isPerfect) showPerfect();
      speak('Player 1 got ' + result + ', scoring ' + roundScore + '. Player 2, your turn!');
      $('next-btn').textContent = "Player 2's Turn";
    } else {
      // Compare
      const p2Score = roundScore;
      if (isPerfect) showPerfect();

      G.roundScores[G.round - 1].p1 = G.p1Score;
      G.roundScores[G.round - 1].p2 = p2Score;

      if (G.p1Score > p2Score) { G.scores[1]++; }
      else if (p2Score > G.p1Score) { G.scores[2]++; }
      // tie: no points

      updateScoreDisplay();
      $('result-score').textContent = 'P1: ' + G.p1Score + ' pts | P2: ' + p2Score + ' pts';
      const winner = G.p1Score > p2Score ? 'Player 1 wins this round!' :
                     p2Score > G.p1Score ? 'Player 2 wins this round!' : "It's a tie!";
      speak(winner);
      announce(winner);
      $('next-btn').textContent = G.round >= G.totalRounds ? 'See Results' : 'Next Round';
    }
  }
}

$('next-btn').addEventListener('click', () => {
  if (G.players === 2 && G.currentPlayer === 1) {
    // Switch to player 2
    G.currentPlayer = 2;
    setupRoundUI();
    return;
  }
  nextRound();
});

/* ========== Timer ========== */
function startTimer() {
  clearTimer();
  G.timerLeft = G.timerTotal;
  updateTimerDisplay();
  G.timerInterval = setInterval(() => {
    G.timerLeft--;
    updateTimerDisplay();
    if (G.timerLeft <= 0) {
      clearTimer();
      timeUp();
    }
  }, 1000);
}

function clearTimer() {
  if (G.timerInterval) { clearInterval(G.timerInterval); G.timerInterval = null; }
}

function updateTimerDisplay() {
  $('hud-time').textContent = G.timerLeft;
  const pct = (G.timerLeft / G.timerTotal) * 100;
  const bar = $('timer-bar');
  bar.style.width = pct + '%';
  bar.classList.remove('warning', 'danger');
  if (pct <= 20) bar.classList.add('danger');
  else if (pct <= 50) bar.classList.add('warning');
}

function timeUp() {
  announce("Time's up!");
  speak("Time's up!");
  enableInputs(false);

  // Auto-calculate if expression is valid, otherwise score 0
  const last = G.expression[G.expression.length - 1];
  const opens = G.expression.filter(t => t.type === 'bracket' && t.value === '(').length;
  const closes = G.expression.filter(t => t.type === 'bracket' && t.value === ')').length;
  const canCalc = G.expression.length > 0 && (last && (last.type === 'digit' || (last.type === 'bracket' && last.value === ')'))) && opens === closes;

  if (canCalc) {
    const exprStr = G.expression.map(t => t.value).join(' ');
    try {
      let result = parseAndEvaluate(exprStr);
      if (isFinite(result)) {
        result = Math.round(result * 1000) / 1000;
        const diff = Math.abs(result - 100);
        const roundScore = Math.max(0, Math.round(100 - diff));
        showResult(result, roundScore);
        return;
      }
    } catch (e) { /* fall through */ }
  }
  showResult(0, 0);
}

function enableInputs(enabled) {
  $('calc-btn').disabled = !enabled;
  $('undo-btn').disabled = !enabled;
  $('clear-btn').disabled = !enabled;
  $('digit-cards').querySelectorAll('button').forEach(b => { if (enabled && !b.classList.contains('used')) b.disabled = false; else if (!enabled) b.disabled = true; });
  $('operator-row').querySelectorAll('button').forEach(b => b.disabled = !enabled);
}

/* ========== End Game ========== */
function endGame() {
  showScreen('summary');

  let html = '';
  if (G.players === 1) {
    const total = G.scores[1];
    const max = G.totalRounds * 100;
    $('summary-title').textContent = 'Game Over!';
    html += '<div class="summary-row"><span>Total Score</span><span><b>' + total + '</b> / ' + max + '</span></div>';
    const pct = Math.round((total / max) * 100);
    let grade = pct >= 90 ? 'Amazing!' : pct >= 70 ? 'Great job!' : pct >= 50 ? 'Good effort!' : 'Keep practising!';
    html += '<div style="font-size:var(--font-size-xl);margin-top:var(--spacing-sm);font-weight:700;color:var(--color-primary);">' + grade + '</div>';
    speak('Game over! You scored ' + total + ' out of ' + max + '. ' + grade);
  } else {
    const w = G.scores[1] > G.scores[2] ? 'Player 1 wins!' : G.scores[2] > G.scores[1] ? 'Player 2 wins!' : "It's a draw!";
    $('summary-title').textContent = w;
    html += '<div class="summary-row"><span>Player 1</span><span><b>' + G.scores[1] + '</b> rounds</span></div>';
    html += '<div class="summary-row"><span>Player 2</span><span><b>' + G.scores[2] + '</b> rounds</span></div>';
    speak('Game over! ' + w);
  }
  $('summary-scores').innerHTML = html;

  // Round table
  const table = $('round-table');
  let thead = '<thead><tr><th>Rnd</th><th>Digits</th>';
  if (G.players === 1) thead += '<th>Score</th>';
  else thead += '<th>P1</th><th>P2</th>';
  thead += '</tr></thead>';

  let tbody = '<tbody>';
  G.roundScores.forEach((r, i) => {
    tbody += '<tr><td>' + (i + 1) + '</td><td>' + r.digits.join(', ') + '</td>';
    if (G.players === 1) {
      tbody += '<td>' + (r.p1 !== null ? r.p1 : 0) + '</td>';
    } else {
      tbody += '<td>' + (r.p1 !== null ? r.p1 : 0) + '</td>';
      tbody += '<td>' + (r.p2 !== null ? r.p2 : 0) + '</td>';
    }
    tbody += '</tr>';
  });
  tbody += '</tbody>';
  table.innerHTML = thead + tbody;
}

/* ========== PERFECT animation ========== */
function showPerfect() {
  // Banner
  const banner = document.createElement('div');
  banner.className = 'perfect-banner';
  banner.textContent = 'PERFECT!';
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 2000);

  // Confetti
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);

  const colors = ['#E85D75', '#4A90D9', '#5CB85C', '#F5A623', '#9B6BC2', '#14b8a6'];
  for (let i = 0; i < 60; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = Math.random() * 0.8 + 's';
    piece.style.animationDuration = (1.5 + Math.random() * 1.5) + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    container.appendChild(piece);
  }
  setTimeout(() => container.remove(), 3500);
}

/* ========== Safe Expression Parser ========== */
// Tokenizer + recursive descent parser with correct precedence
// Grammar:
//   expr     -> term (('+' | '-') term)*
//   term     -> factor (('x' | '/') factor)*
//   factor   -> '(' expr ')' | number
function parseAndEvaluate(str) {
  // Normalize operators
  str = str.replace(/\u00d7/g, '*').replace(/\u00f7/g, '/');
  const tokens = tokenize(str);
  let pos = 0;

  function peek() { return tokens[pos] || null; }
  function consume() { return tokens[pos++]; }

  function parseExpr() {
    let left = parseTerm();
    while (peek() === '+' || peek() === '-') {
      const op = consume();
      const right = parseTerm();
      left = op === '+' ? left + right : left - right;
    }
    return left;
  }

  function parseTerm() {
    let left = parseFactor();
    while (peek() === '*' || peek() === '/') {
      const op = consume();
      const right = parseFactor();
      left = op === '*' ? left * right : left / right;
    }
    return left;
  }

  function parseFactor() {
    if (peek() === '(') {
      consume(); // '('
      const val = parseExpr();
      if (peek() !== ')') throw new Error('Missing )');
      consume(); // ')'
      return val;
    }
    const tok = consume();
    const n = parseFloat(tok);
    if (isNaN(n)) throw new Error('Unexpected token: ' + tok);
    return n;
  }

  const result = parseExpr();
  if (pos < tokens.length) throw new Error('Unexpected tokens remaining');
  return result;
}

function tokenize(str) {
  const tokens = [];
  let i = 0;
  while (i < str.length) {
    if (str[i] === ' ') { i++; continue; }
    if ('()+-*/'.includes(str[i])) {
      tokens.push(str[i]); i++; continue;
    }
    if (/[0-9.]/.test(str[i])) {
      let num = '';
      while (i < str.length && /[0-9.]/.test(str[i])) { num += str[i]; i++; }
      tokens.push(num); continue;
    }
    throw new Error('Unexpected character: ' + str[i]);
  }
  return tokens;
}

/* ========== Demo ========== */
$('demo-btn').addEventListener('click', runDemo);
$('demo-close-btn').addEventListener('click', () => {
  $('demo-overlay').classList.remove('active');
  if (G.demoTimeout) clearTimeout(G.demoTimeout);
});

G.demoTimeout = null;

function runDemo() {
  const overlay = $('demo-overlay');
  overlay.classList.add('active');
  const exprEl = $('demo-expr');
  const stepEl = $('demo-step');
  exprEl.textContent = '';
  stepEl.textContent = '';

  const steps = [
    { expr: '', step: 'We have the digits: 5, 3, 8, 2' },
    { expr: '5', step: 'Start with 5...' },
    { expr: '5 +', step: 'Add a plus...' },
    { expr: '5 + 3', step: 'Then 3...' },
    { expr: '5 + 3 \u00d7', step: 'Multiply by...' },
    { expr: '5 + 3 \u00d7 8', step: '8! Remember, \u00d7 comes first...' },
    { expr: '5 + 3 \u00d7 8 -', step: 'Minus...' },
    { expr: '5 + 3 \u00d7 8 - 2', step: '2! Now calculate...' },
    { expr: '5 + 3 \u00d7 8 - 2 = 27', step: '5 + 24 - 2 = 27. Score: 73/100' },
    { expr: '', step: 'Let us try again with brackets!' },
    { expr: '(', step: 'Open bracket...' },
    { expr: '( 5 +', step: '5 plus...' },
    { expr: '( 5 + 3 )', step: '3, close bracket. That makes 8...' },
    { expr: '( 5 + 3 ) \u00d7', step: 'Times...' },
    { expr: '( 5 + 3 ) \u00d7 ( 8 + 2 )', step: '(8 + 2) = 10. So 8 \u00d7 10...' },
    { expr: '( 5 + 3 ) \u00d7 ( 8 + 2 ) = 80', step: '= 80. Score: 80/100. Closer!' },
    { expr: '', step: 'Try to get as close to 100 as you can!' },
  ];

  let i = 0;
  function nextStep() {
    if (i >= steps.length) return;
    exprEl.textContent = steps[i].expr;
    stepEl.textContent = steps[i].step;
    i++;
    if (i < steps.length) {
      G.demoTimeout = setTimeout(nextStep, 1800);
    }
  }
  nextStep();
}

/* ========== Init ========== */
updateMuteButtons();
</script>
